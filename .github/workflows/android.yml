name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web Assets
        run: |
          mkdir -p www
          cp index.html style.css script.js www/ || true
          
      - name: Capacitor Android Setup
        run: |
          npm install --force
          npx cap add android
          
          # 使用更鲁棒的脚本注入 MainActivity.java
          python3 -c "
          import os
          path = 'android/app/src/main/java/com/mytiktok/app/MainActivity.java'
          with open(path, 'r') as f: content = f.read()
          
          imports = 'import android.os.Bundle;\nimport android.content.Intent;\nimport android.net.Uri;\nimport android.os.Build;\nimport android.os.Environment;\nimport android.provider.Settings;\nimport android.webkit.WebSettings;'
          if 'import android.os.Bundle;' not in content:
              content = content.replace('import com.getcapacitor.BridgeActivity;', 'import com.getcapacitor.BridgeActivity;\n' + imports)
          
          logic = '''
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // 强制开启 WebView 文件访问权限 (解决重启后加载失败的关键)
                  WebSettings settings = this.bridge.getWebView().getSettings();
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);

                  // 自动跳转到“所有文件访问权限”设置页 (针对 Android 11+)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      if (!Environment.isExternalStorageManager()) {
                          try {
                              Intent intent = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);
                              intent.setData(Uri.parse(\"package:\" + getPackageName()));
                              startActivity(intent);
                          } catch (Exception e) {}
                      }
                  }
              }
          '''
          # 寻找类定义的左大括号并插入逻辑
          if 'protected void onCreate' not in content:
              content = content.replace('public class MainActivity extends BridgeActivity {', 'public class MainActivity extends BridgeActivity {' + logic)
          
          with open(path, 'w') as f: f.write(content)
          "

          # 修改 AndroidManifest.xml 注入顶级权限
          python3 -c "
          import os
          p = 'android/app/src/main/AndroidManifest.xml'
          with open(p, 'r') as f: c = f.read()
          if 'xmlns:tools' not in c:
              c = c.replace('<manifest', '<manifest xmlns:tools=\"http://schemas.android.com/tools\"')
          if 'android:requestLegacyExternalStorage' not in c:
              c = c.replace('<application', '<application android:requestLegacyExternalStorage=\"true\"')
          
          perms = '\\n    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\\n    <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\" tools:ignore=\"ScopedStorage\" />\\n'
          if 'android.permission.MANAGE_EXTERNAL_STORAGE' not in c:
              c = c.replace('</manifest>', perms + '</manifest>')
          with open(p, 'w') as f: f.write(c)
          "
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTokPlayer-Ultimate-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
