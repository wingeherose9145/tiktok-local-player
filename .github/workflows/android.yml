name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web Assets
        run: |
          mkdir -p www
          cp index.html style.css script.js www/ || true
          
      - name: Capacitor Android Setup
        run: |
          npm install --force
          npx cap add android
          
          # 使用正则匹配注入，避免硬编码空格导致的失败
          python3 -c "
          import os, re
          path = 'android/app/src/main/java/com/mytiktok/app/MainActivity.java'
          if os.path.exists(path):
              with open(path, 'r') as f: content = f.read()
              
              imports = 'import android.os.Bundle;\nimport android.webkit.WebSettings;\nimport android.content.Intent;\nimport android.net.Uri;\nimport android.os.Build;\nimport android.os.Environment;\nimport android.provider.Settings;'
              if 'android.os.Bundle' not in content:
                  content = content.replace('import com.getcapacitor.BridgeActivity;', 'import com.getcapacitor.BridgeActivity;\n' + imports)
              
              # 使用原始字符串处理 Java 代码
              logic = r'''
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      WebSettings s = this.bridge.getWebView().getSettings();
                      s.setAllowFileAccess(true);
                      s.setAllowContentAccess(true);
                      s.setAllowFileAccessFromFileURLs(true);
                      s.setAllowUniversalAccessFromFileURLs(true);
                  } catch (Exception e) {}

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      if (!Environment.isExternalStorageManager()) {
                          try {
                              Intent i = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);
                              i.setData(Uri.parse(\"package:\" + getPackageName()));
                              startActivity(i);
                          } catch (Exception e) {}
                      }
                  }
              }
          '''
              content = re.sub(r'(public class MainActivity extends BridgeActivity\s*\{)', r'\1' + logic, content)
              with open(path, 'w') as f: f.write(content)
          "

          # 修复清单文件：移除复杂的反斜杠，直接使用单引号包裹双引号内容
          python3 -c "
          import os
          p = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(p):
              with open(p, 'r') as f: c = f.read()
              
              if 'xmlns:tools' not in c:
                  c = c.replace('<manifest', '<manifest xmlns:tools=\"http://schemas.android.com/tools\"')
              
              if 'android:requestLegacyExternalStorage' not in c:
                  c = c.replace('<application', '<application android:requestLegacyExternalStorage=\"true\"')
              
              # 注入权限声明
              perms = '\n    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />'
              perms += '\n    <uses-permission android:name=\"android.permission.READ_MEDIA_VIDEO\" />'
              perms += '\n    <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\" tools:ignore=\"ScopedStorage\" />\n'
              
              if 'MANAGE_EXTERNAL_STORAGE' not in c:
                  c = c.replace('</manifest>', perms + '</manifest>')
              
              with open(p, 'w') as f: f.write(c)
          "
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTok-Final-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
